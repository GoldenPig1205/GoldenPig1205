jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Project List
        run: |
          echo "## 🚀 Projects" > projects.md
          curl -s https://api.github.com/users/GoldenPig1205/repos \
          | jq -r '.[] | "- \(.name)"' >> projects.md

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add projects.md
          git commit -m "update projects" || exit 0
          git push